<!DOCTYPE html><head>
<title>LittleJS UI System Template</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine settings, customize if necessary
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;

// AI can use this class to make sound effects
class SoundGenerator extends Sound
{
    constructor(params = {})
    {
        const {
            volume = 1,
            randomness = .05,
            frequency = 220,
            attack = 0,
            release = .1,
            shapeCurve = 1,
            slide = 0,
            pitchJump = 0,
            pitchJumpTime = 0,
            repeatTime = 0,
            noise = 0,
            bitCrush = 0,
            delay = 0,
        } = params;

        super([volume, randomness, frequency, attack, 0, release, 0, shapeCurve, slide, 0,
            pitchJump, pitchJumpTime, repeatTime, noise, 0, bitCrush, delay, 1, 0, 0, 0]);
    }
}

///////////////////////////////////////////////////////////////////////////////
// UI SYSTEM TEMPLATE

// Build a tiny procedural atlas (4x1 of 128px tiles) so UITile works
// without any external image assets. Swap or remove if not needed.
function createDemoAtlas()
{
    const tileSize = 128, cols = 4;
    const cvs = document.createElement('canvas');
    cvs.width = tileSize * cols;
    cvs.height = tileSize;
    const ctx = cvs.getContext('2d');

    const glyphs = ['♥', '★', '◆', '☀'];
    const hues = [0, .15, .55, .8];
    for (let i = 0; i < cols; i++)
    {
        const x = i * tileSize;
        const grad = ctx.createRadialGradient(
            x + tileSize/2, tileSize/2, 8,
            x + tileSize/2, tileSize/2, tileSize/1.4);
        grad.addColorStop(0, `hsl(${hues[i]*360},90%,70%)`);
        grad.addColorStop(1, `hsl(${hues[i]*360},70%,25%)`);
        ctx.fillStyle = grad;
        ctx.fillRect(x, 0, tileSize, tileSize);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 96px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(glyphs[i], x + tileSize/2, tileSize/2 + 6);
    }

    textureInfos[0] = new TextureInfo(cvs);
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    createDemoAtlas();

    // setup ui system plugin
    new UISystemPlugin;
    uiSystem.defaultSoundPress = new Sound([.5,0,220]);
    uiSystem.defaultSoundClick = new Sound([.5,0,440]);
    uiSystem.defaultCornerRadius = 8;
    uiSystem.defaultShadowColor = BLACK;

    // setup example menu
    let navigationIndex = 0;
    const uiMenu = new UIObject(mainCanvasSize.scale(.5), vec2(700,450));
    canvasClearColor = hsl(0,0,.8);

    // example text
    uiMenu.addChild(new UIText(vec2(-100,-120), vec2(450, 80),
        'LittleJS UI\nSystem Demo'));

    // example image
    uiMenu.addChild(new UITile(vec2(230,-140), vec2(170), tile(3, 128)));

    // example checkbox
    const checkbox = new UICheckbox(vec2(-170,0), vec2(50));
    checkbox.navigationIndex = ++navigationIndex;
    checkbox.onChange = ()=> button1.disabled = checkbox.checked;
    uiMenu.addChild(checkbox);

    // example text input
    const textInput = new UITextInput(vec2(50,0), vec2(300, 80), 'Text Input');
    textInput.textHeight = 60;
    textInput.maxLength = 16;
    textInput.navigationIndex = ++navigationIndex;
    uiMenu.addChild(textInput);
    textInput.onChange = ()=> canvasClearColor = randColor();

    // example slider
    const slider = new UISlider(vec2(0,90), vec2(400, 50),
        soundVolume, 'Volume');
    slider.navigationIndex = ++navigationIndex;
    uiMenu.addChild(slider);
    slider.onChange = ()=> setSoundVolume(slider.value);

    // exit button
    const button1 = new UIButton(vec2(0,170), vec2(200, 50), 'Exit Menu');
    button1.textHeight = 40;
    button1.navigationIndex = ++navigationIndex;
    button1.navigationAutoSelect = true;
    uiMenu.addChild(button1);
    button1.onClick = ()=> uiSystem.showConfirmDialog('Exit menu?',
        ()=> { uiMenu.visible = false; buttonBack.visible = true; });

    // example button that returns to menu
    const buttonBack = new UIButton(mainCanvasSize.scale(.5), vec2(200),
        'Back\nto\nMenu');
    buttonBack.visible = false;
    buttonBack.textHeight = 60;
    buttonBack.navigationIndex = ++navigationIndex;
    buttonBack.navigationAutoSelect = true;
    buttonBack.onClick = ()=>
        { uiMenu.visible = true; buttonBack.visible = false; };
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // called every frame at 60 frames per second
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    // called after physics and objects are updated
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // called before objects are rendered
    // background is drawn by canvasClearColor
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    // called after objects are rendered
    // UI is drawn automatically by the UISystemPlugin
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script></body></html>
