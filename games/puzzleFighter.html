<!DOCTYPE html><head>
<title>LittleJS Puzzle Fighter</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../templates/menus.js"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);

///////////////////////////////////////////////////////////////////////////////
// Constants

const BOARD_W = 6;
const BOARD_H_VISIBLE = 13;
const BOARD_H = 15;            // 2 extra spawn rows above visible
const SPAWN_COL = 3;           // 0-indexed; "4th column" in arcade terms

const COLOR_R = 0, COLOR_G = 1, COLOR_B = 2, COLOR_Y = 3;
const GEM_COLORS = [
    rgb(1, .2, .25),   // 0 R
    rgb(.15, .95, .4), // 1 G
    rgb(.2, .55, 1),   // 2 B
    rgb(1, .9, .2),    // 3 Y
];

///////////////////////////////////////////////////////////////////////////////
// Gem factories

let _nextPowerGemId = 1;
function nextPowerGemId() { return _nextPowerGemId++; }

function gemRegular(color) { return { type:'regular', color, powerGemId:-1 }; }
function gemCrash(color)   { return { type:'crash',   color }; }
function gemCounter(color, countdown) { return { type:'counter', color, countdown }; }
function gemDiamond()      { return { type:'diamond' }; }

///////////////////////////////////////////////////////////////////////////////
// Grid helpers

function inBounds(x, y) { return x >= 0 && x < BOARD_W && y >= 0 && y < BOARD_H; }

function emptyGrid()
{
    return [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(null));
}

function isRegular(g) { return g && g.type === 'regular'; }

///////////////////////////////////////////////////////////////////////////////
// Power gem rectangle merge (pure function over grid)

function mergePowerGems(grid)
{
    let changed = false;
    const visited = [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(false));

    for (let sx = 0; sx < BOARD_W; sx++)
    for (let sy = 0; sy < BOARD_H; sy++)
    {
        if (visited[sx][sy]) continue;
        const seed = grid[sx][sy];
        if (!isRegular(seed)) continue;

        // Flood-fill connected same-color region
        const color = seed.color;
        const region = [];
        const stack = [[sx, sy]];
        let minX = sx, minY = sy, maxX = sx, maxY = sy;
        while (stack.length)
        {
            const [x, y] = stack.pop();
            if (!inBounds(x, y) || visited[x][y]) continue;
            const g = grid[x][y];
            if (!isRegular(g) || g.color !== color) continue;
            visited[x][y] = true;
            region.push([x, y]);
            minX = min(minX, x); minY = min(minY, y);
            maxX = max(maxX, x); maxY = max(maxY, y);
            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }
        if (region.length < 4) continue;

        // Check bbox is fully filled with same-color regulars
        const bboxW = maxX - minX + 1;
        const bboxH = maxY - minY + 1;
        if (bboxW < 2 || bboxH < 2) continue;
        if (region.length !== bboxW * bboxH) continue;

        // Assign a single powerGemId across the bbox
        let chosenId = Infinity;
        for (let x = minX; x <= maxX; x++)
        for (let y = minY; y <= maxY; y++)
        {
            const g = grid[x][y];
            if (g.powerGemId >= 0) chosenId = min(chosenId, g.powerGemId);
        }
        if (chosenId === Infinity) chosenId = nextPowerGemId();

        for (let x = minX; x <= maxX; x++)
        for (let y = minY; y <= maxY; y++)
        {
            const g = grid[x][y];
            if (g.powerGemId !== chosenId)
            {
                g.powerGemId = chosenId;
                changed = true;
            }
        }
    }

    return changed;
}

///////////////////////////////////////////////////////////////////////////////
// Piece geometry

const ROT_OFFSETS = [
    vec2(0,  1),  // 0: b above
    vec2(1,  0),  // 1: b right
    vec2(0, -1),  // 2: b below
    vec2(-1, 0),  // 3: b left
];

function pieceCells(piece, x, y, rot)
{
    x = (x !== undefined) ? x : piece.x;
    y = (y !== undefined) ? y : piece.y;
    rot = (rot !== undefined) ? rot : piece.rot;
    const o = ROT_OFFSETS[rot];
    return [
        { x: x, y: y, gem: piece.a },
        { x: x + o.x, y: y + o.y, gem: piece.b },
    ];
}

function pieceCanPlace(grid, piece, x, y, rot)
{
    const cells = pieceCells(piece, x, y, rot);
    for (const c of cells)
    {
        if (c.x < 0 || c.x >= BOARD_W) return false;
        if (c.y < 0) return false;
        if (c.y < BOARD_H && grid[c.x][c.y]) return false;
    }
    return true;
}

function pieceTryMove(grid, piece, dx, dy)
{
    if (pieceCanPlace(grid, piece, piece.x + dx, piece.y + dy, piece.rot))
    { piece.x += dx; piece.y += dy; return true; }
    return false;
}

function pieceTryRotate(grid, piece, dir)
{
    const nr = (piece.rot + dir + 4) % 4;
    const kicks = [vec2(0,0), vec2(-1,0), vec2(1,0), vec2(0,1)];
    for (const k of kicks)
    {
        if (pieceCanPlace(grid, piece, piece.x + k.x, piece.y + k.y, nr))
        { piece.x += k.x; piece.y += k.y; piece.rot = nr; return true; }
    }
    return false;
}

function lockPieceWithSeparation(grid, piece)
{
    const cells = pieceCells(piece);
    // Sort top-down so we place the lower cell first
    cells.sort((c1, c2) => c1.y - c2.y);

    const placed = [];

    for (const c of cells)
    {
        if (c.y >= BOARD_H) continue;  // overflow → ignored here, caller handles game-over

        // Column drop: find lowest empty cell at this column at or below c.y
        let landY = c.y;
        while (landY > 0 && !grid[c.x][landY - 1]) landY--;
        grid[c.x][landY] = c.gem;
        placed.push([c.x, landY]);
    }

    return placed;
}

///////////////////////////////////////////////////////////////////////////////
// Placeholder Board

class Board
{
    constructor()
    {
        this.grid = [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(null));
    }
}

let p1Board, p2Board;

///////////////////////////////////////////////////////////////////////////////
// Unit tests (stub - tasks add cases here)

function runUnitTests()
{
    const fails = [];
    const assert = (cond, msg) =>
    {
        if (cond) console.log('TEST PASS:', msg);
        else { console.error('TEST FAIL:', msg); fails.push(msg); }
    };

    // (tests added in later tasks)

    // --- Power gem merge tests ---
    {
        const place = (g, x, y, color) => { g[x][y] = gemRegular(color); };

        // 2x2 forms one power gem
        let g = emptyGrid();
        place(g, 0, 0, COLOR_R); place(g, 1, 0, COLOR_R);
        place(g, 0, 1, COLOR_R); place(g, 1, 1, COLOR_R);
        mergePowerGems(g);
        const id1 = g[0][0].powerGemId;
        assert(id1 >= 0, 'merge: 2x2 gets a powerGemId');
        assert(g[1][1].powerGemId === id1, 'merge: 2x2 shares one id');

        // L-shape (3 cells) does NOT merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_G); place(g, 1, 0, COLOR_G); place(g, 0, 1, COLOR_G);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: L-shape does not merge');

        // 2x2 with one off-color hole does NOT merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_B); place(g, 1, 0, COLOR_B);
        place(g, 0, 1, COLOR_Y); place(g, 1, 1, COLOR_B);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: mixed-color bbox does not merge');

        // Adjacent 2x2 + 2x2 = 4x2 (or 2x4) when filled
        g = emptyGrid();
        for (let x = 0; x < 4; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_R);
        mergePowerGems(g);
        const idAll = g[0][0].powerGemId;
        let allSame = true;
        for (let x = 0; x < 4; x++)
        for (let y = 0; y < 2; y++)
            if (g[x][y].powerGemId !== idAll) allSame = false;
        assert(allSame, 'merge: 4x2 filled region shares one id');

        // Counter gem in the middle blocks merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_Y); place(g, 1, 0, COLOR_Y);
        place(g, 0, 1, COLOR_Y); g[1][1] = gemCounter(COLOR_Y, 5);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: counter gem blocks rectangle');

        // Return value: true when something changed, false on a stable grid
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_R);
        assert(mergePowerGems(g) === true,  'merge: returns true when 2x2 newly formed');
        assert(mergePowerGems(g) === false, 'merge: returns false on stable grid (idempotent)');

        // Extension: 2x2 grows to 2x3, existing id preserved
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_B);
        mergePowerGems(g);
        const extId = g[0][0].powerGemId;
        place(g, 0, 2, COLOR_B); place(g, 1, 2, COLOR_B);
        mergePowerGems(g);
        assert(g[0][2].powerGemId === extId, 'merge: 2x2 extending to 2x3 keeps existing id');
        assert(g[0][0].powerGemId === extId, 'merge: original cells still have same id after extension');
    }

    // --- Piece tests ---
    {
        // Rotation offsets
        const p = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 3, y: 5, rot: 0 };
        let cells = pieceCells(p);
        assert(cells[0].x === 3 && cells[0].y === 5, 'piece: a at (3,5)');
        assert(cells[1].x === 3 && cells[1].y === 6, 'piece: b above a (rot 0)');

        cells = pieceCells(p, 3, 5, 1);
        assert(cells[1].x === 4 && cells[1].y === 5, 'piece: b right of a (rot 1)');

        cells = pieceCells(p, 3, 5, 2);
        assert(cells[1].x === 3 && cells[1].y === 4, 'piece: b below a (rot 2)');

        cells = pieceCells(p, 3, 5, 3);
        assert(cells[1].x === 2 && cells[1].y === 5, 'piece: b left of a (rot 3)');

        // Move blocked by wall
        let g = emptyGrid();
        const p2 = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 0, y: 5, rot: 0 };
        assert(!pieceTryMove(g, p2, -1, 0), 'piece: cannot move into left wall');
        assert(pieceTryMove(g, p2, 1, 0), 'piece: can move right');

        // Separation on lock: vertical pair, both land at base
        g = emptyGrid();
        const pv = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 2, y: 5, rot: 0 };
        lockPieceWithSeparation(g, pv);
        assert(g[2][0] && g[2][0].color === COLOR_R, 'separation: vertical a lands at bottom');
        assert(g[2][1] && g[2][1].color === COLOR_G, 'separation: vertical b stacks on a');

        // Separation: horizontal pair with one side over a tall column
        g = emptyGrid();
        g[3][0] = gemRegular(COLOR_B);
        g[3][1] = gemRegular(COLOR_B);
        g[3][2] = gemRegular(COLOR_B);
        const ph = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 2, y: 5, rot: 1 };
        // a at col 2, b at col 3
        lockPieceWithSeparation(g, ph);
        assert(g[2][0] && g[2][0].color === COLOR_R, 'separation: a falls to bottom of empty col');
        assert(g[3][3] && g[3][3].color === COLOR_G, 'separation: b lands on top of stacked col');
    }

    if (fails.length === 0) console.log('All unit tests passed.');
    else console.error('UNIT TEST FAILURES:', fails.length);
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    setCanvasFixedSize(vec2(1280, 720));
    cameraPos = vec2(0, 0);
    cameraScale = 32;

    p1Board = new Board();
    p2Board = new Board();

    runUnitTests();
}

function gameUpdate() {}
function gameUpdatePost() { cameraPos = vec2(0, 0); }
function gameRender()
{
    drawRectGradient(cameraPos, getCameraSize(), rgb(.06,.06,.08), rgb(.01,.01,.02));
}
function gameRenderPost()
{
    drawTextScreen('Puzzle Fighter (scaffold)', vec2(mainCanvasSize.x/2, 40), 36, hsl(.6,1,.9), 4, hsl(0,0,0));
}

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
