<script>
'use strict';

// engine settings, do not remove
debugWatermark = false; // Hide debug watermark in corner
showEngineVersion = false; // Hide engine version console display
paused = false;

///////////////////////////////////////////////////////////////////////////////
// Lunar Lander (solid-color primitives only) - smooth terrain + level ramp

// World / terrain
const WORLD_HALF_WIDTH = 32;
const TERRAIN_BASE     = -8;       // average ground height

// Landing pad
const PAD_THICK = .5;

// Flight model (base values; some scale per level)
const GRAVITY_BASE  = -.0012;      // moon-ish
const THRUST_POWER  = .0030;       // main engine
const TURN_POWER    = .0022;       // angular accel
const FUEL_BURN     = 20;          // fuel units / second while thrusting

const SAFE_SPEED = .10;
const SAFE_ANGLE = .22;            // radians (~12.6 deg)

// Camera tuning (cameraScale = pixels per world unit; smaller = zoomed out)
const CAMERA_SCALE_FAR  = 22;      // start / wide view
const CAMERA_SCALE_NEAR = 60;      // close-up near pad
const CAMERA_ZOOM_IN_DIST  = 8;    // fully zoomed in inside this distance
const CAMERA_ZOOM_OUT_DIST = 18;   // start zooming in inside this distance

let player, landingPad;
let gameState = 0;                 // 0=playing, 1=landed, 2=crashed
let level = 1;
let totalScore = 0;
let lastLevelScore = 0;
let messageTimer = new Timer();
let camTarget = vec2();
let camScale = CAMERA_SCALE_FAR;
let lastTouchdownSpeed = 0;        // speed at moment of ground contact (for scoring)

// terrain state (analytic, generated per level)
let terrain, distFar, distMid;     // octave sets {base, arr:[{amp,freq,phase}]}
let padX = 0, padY = TERRAIN_BASE, padWidth = 6;

// background
let stars = [];

// Sounds
const sfxThrust = new SoundGenerator({ volume:.18, frequency:90, release:.08, noise:.25, shapeCurve:.7, slide:-.4, randomness:.15 });
const sfxBoom   = new SoundGenerator({ volume:.65, frequency:65, release:.35, noise:.6,  shapeCurve:.2, slide:-1.5, bitCrush:3, delay:.04 });
const sfxLand   = new SoundGenerator({ volume:.35, frequency:520, release:.12, shapeCurve:1.2, pitchJump:-120, pitchJumpTime:.02, delay:.03 });

///////////////////////////////////////////////////////////////////////////////
// Smooth analytic terrain

function makeOctaves(base, amp0, freq0, count, ampMul, freqMul)
{
    const arr = [];
    let amp = amp0, freq = freq0;
    for (let i = 0; i < count; ++i)
    {
        arr.push({ amp, freq, phase: rand(2*PI) });
        amp *= ampMul;
        freq *= freqMul;
    }
    return { base, arr };
}

function evalOctaves(o, x)
{
    let y = o.base;
    for (const w of o.arr)
        y += w.amp * Math.sin(w.freq*x + w.phase);
    return y;
}

// terrain height at world x, with the flat pad mesa blended in
function getTerrainY(x)
{
    const raw = evalOctaves(terrain, x);
    const d = abs(x - padX);
    const half = padWidth/2;
    if (d <= half) return padY;
    const t = clamp((d - half)/(padWidth*.9 + 2), 0, 1);
    return lerp(padY, raw, smoothStep(t));
}

///////////////////////////////////////////////////////////////////////////////
// Level setup

function difficulty()
{
    // gentle ramp, all capped so it stays playable
    const n = level - 1;
    return {
        amp:      clamp(3 + n*.65, 3, 9.5),        // terrain roughness
        gravity:  GRAVITY_BASE - min(n, 8)*.00006, // a touch heavier each level
        padWidth: clamp(6 - n*.45, 3.2, 6),        // smaller pad
        fuel:     clamp(80 - n*6, 42, 80),         // less fuel
    };
}

function startLevel(n)
{
    engineObjectsDestroy();
    level = n;
    gameState = 0;
    messageTimer.unset();

    const cfg = difficulty();
    gravity.y = cfg.gravity;
    padWidth = cfg.padWidth;

    // generate smooth terrain + two distant silhouette layers
    const amp = cfg.amp;
    terrain = makeOctaves(TERRAIN_BASE,       amp,     .060, 5, .50, 2.1);
    distMid = makeOctaves(TERRAIN_BASE + 1.5, amp*.90, .045, 3, .55, 2.0);
    distFar = makeOctaves(TERRAIN_BASE + 3.0, amp*.75, .032, 2, .55, 2.0);

    // choose a pad location; pad surface follows the natural terrain height there
    padX = rand(WORLD_HALF_WIDTH - 8, -WORLD_HALF_WIDTH + 8);
    padY = clamp(evalOctaves(terrain, padX), TERRAIN_BASE - 4, TERRAIN_BASE + 3);

    // pad is a plain object (custom collision); camera + render read it
    landingPad = { pos: vec2(padX, padY + PAD_THICK/2), size: vec2(padWidth, PAD_THICK) };

    // player starts well above the pad, offset to one side
    player = new Player(vec2(padX + rand(11, -11), padY + 22));
    player.fuel = cfg.fuel;
    player.maxFuel = cfg.fuel;

    // start framed on the whole approach
    camTarget = player.pos.lerp(landingPad.pos, .5);
    cameraPos = camTarget.copy();
    camScale = CAMERA_SCALE_FAR;
    cameraScale = camScale;
}

function startGame()
{
    level = 1;
    totalScore = 0;
    startLevel(1);
    setPlaying(true);
    clearSubmenuStack();
    hideAllMenus();
}

///////////////////////////////////////////////////////////////////////////////
class Debris extends EngineObject
{
    constructor(pos, vel, color)
    {
        super(pos, vec2(rand(.25,.08)), 0, rand(PI, -PI), color);
        this.velocity = vel;
        this.angleVelocity = rand(.25, -.25);
        this.life = rand(1.2, .5);
        this.maxLife = this.life;
        this.damping = .98;
        this.angleDamping = .98;
        this.gravityScale = .4;
    }

    update()
    {
        this.life -= timeDelta;
        if (this.life <= 0)
            this.destroy();
    }

    render()
    {
        const a = clamp(this.life/this.maxLife, 0, 1);
        drawCircle(this.pos, this.size.x, rgb(this.color.r, this.color.g, this.color.b, a));
    }
}

// expanding blast ring + initial flash for explosions
class ShockWave extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2());
        this.t = 0;
        this.renderOrder = 1e9;
    }

    update()
    {
        this.t += timeDelta*2.6;
        if (this.t >= 1) this.destroy();
    }

    render()
    {
        const a = 1 - this.t;
        if (this.t < .4) // bright flash
            drawCircle(this.pos, lerp(3, 7, this.t), rgb(1,.95,.7, (.4-this.t)*1.4));
        // expanding ring (transparent fill, glowing outline)
        drawCircle(this.pos, lerp(1.5, 13, this.t), rgb(1,.7,.4,0), .35*a, rgb(1,.8,.5, a*.7));
    }
}

// fireball + sparks + chunks + shockwave
function makeExplosion(pos, vel = vec2())
{
    new ShockWave(pos);

    // additive fireball
    new ParticleEmitter(
        pos, 0,
        .9, .12, 380, PI,                  // emitSize, emitTime(burst), emitRate, emitConeAngle
        undefined,
        rgb(1,.92,.5), rgb(1,.5,.12),      // bright core colors
        rgb(1,.2,0,0), rgb(.4,0,0,0),      // fade to transparent (additive)
        .75, .95, .12, .32, .1,            // particleTime, sizeStart, sizeEnd, speed, angleSpeed
        .9, 1, .25,                        // damping, angleDamping, gravityScale
        PI, .25,                           // particleConeAngle, fadeRate
        .9, false, true, true,            // randomness, collide, additive, randomColorLinear
        1e9                                // renderOrder
    );

    // additive spark streaks (stretched in direction of motion)
    const sparks = new ParticleEmitter(
        pos, 0,
        .3, .1, 260, PI,
        undefined,
        rgb(1,1,.8), rgb(1,.8,.4),
        rgb(1,.5,.1,0), rgb(1,.2,0,0),
        .55, .3, .05, .7, 0,
        .96, 1, .35,
        PI, .2,
        .5, false, true, true,
        1e9
    );
    sparks.trailScale = .6;

    // solid debris chunks
    for (let i = 0; i < 28; ++i)
    {
        const v = randVec2(rand(.3, .06)).add(vel.scale(.5));
        new Debris(pos.add(randVec2(rand(.7,.1))), v, randColor(rgb(1,.7,.2), rgb(.9,.2,.05), true));
    }
}

///////////////////////////////////////////////////////////////////////////////
class Player extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(1,2), 0, 0, rgb(.9,.9,.95));
        this.angleDamping = .95;
        this.damping = .995;
        this.fuel = 80;
        this.maxFuel = 80;
        this.thrusting = false;
        this.thrustSoundTimer = new Timer();

        // rocket exhaust: additive, local-space particle emitter (drives the flame).
        // pos/angle/emitRate are updated every frame from update(); emits out the nozzle.
        this.trail = new ParticleEmitter(
            this.pos, 0,                       // pos, angle (set each frame)
            .22, 0, 0, .42,                    // emitSize, emitTime(0=forever), emitRate(off), emitConeAngle
            undefined,                         // tileInfo (untextured = solid glow)
            rgb(1,.95,.6), rgb(1,.6,.15),      // colorStartA/B  (bright flame core)
            rgb(1,.3,.05,0), rgb(.7,.1,0,0),   // colorEndA/B    (fade to transparent - additive)
            .5, .62, .08, .22, .12,            // particleTime, sizeStart, sizeEnd, speed, angleSpeed
            .9, 1, 0,                          // damping, angleDamping, gravityScale
            .4, .35,                           // particleConeAngle, fadeRate
            .3, false, true, true,             // randomness, collideTiles, additive, randomColorLinear
            1e9, false                          // renderOrder, localSpace
        );
    }

    isSafeLanding()
    {
        return abs(this.angle) < SAFE_ANGLE && this.velocity.length() < SAFE_SPEED;
    }

    // world-space points used for terrain contact (foot pads + body base)
    contactPoints()
    {
        return [vec2(-.92,-1.5), vec2(.92,-1.5), vec2(0,-.85)]
            .map(p => this.pos.add(p.rotate(this.angle)));
    }

    land()
    {
        gameState = 1;
        this.trail.emitRate = 0;
        sfxLand.play();
        addScreenShake(.4, .25);

        // snap upright and rest legs on the pad
        this.angle = 0;
        this.angleVelocity = 0;
        this.velocity = vec2();
        this.pos.x = padX;
        this.pos.y = padY + PAD_THICK + 1.5;

        // score: level bonus + leftover fuel + soft-touchdown bonus
        const soft = max(0, 100 - lastTouchdownSpeed*900) | 0;
        lastLevelScore = (level*100) + (this.fuel*4 | 0) + soft;
        totalScore += lastLevelScore;
        submitBestScore(totalScore);
        messageTimer.set(999);
    }

    explode()
    {
        if (gameState) return;
        gameState = 2;
        this.trail.emitRate = 0;
        messageTimer.set(999);
        sfxBoom.play();
        addScreenShake(1.6, .6);

        makeExplosion(this.pos, this.velocity);
        submitBestScore(totalScore);
        this.destroy();
    }

    update()
    {
        if (gameState) return;

        // rotation: keyboard + analog stick + shoulder buttons
        const moveInput = keyDirection();
        let rotateInput = moveInput.x;
        const stickX = gamepadStick(0).x;
        if (abs(stickX) > .2) rotateInput += stickX;
        if (gamepadIsDown(4)) rotateInput += 1;
        if (gamepadIsDown(5)) rotateInput -= 1;
        rotateInput = clamp(rotateInput, -1, 1);
        this.applyAngularAcceleration(rotateInput * TURN_POWER);

        // main thrust (Up/W/Space + gamepad A + touch button)
        const thrustHeld = moveInput.y > 0 || keyIsDown('Space') || gamepadIsDown(0);
        const canThrust = thrustHeld && this.fuel > 0;
        this.thrusting = canThrust;

        // drive the exhaust plume from the nozzle, firing opposite the ship's "up"
        this.trail.pos = this.pos.add(vec2(0,-1.08).rotate(this.angle));
        this.trail.angle = this.angle + PI;
        this.trail.emitRate = canThrust ? 280 : 0;

        if (canThrust)
        {
            this.applyAcceleration(this.getUp(THRUST_POWER));
            this.fuel = max(0, this.fuel - FUEL_BURN*timeDelta);
            this.applyAcceleration(randVec2(.00015)); // tiny hover jitter

            if (!this.thrustSoundTimer.active())
            {
                sfxThrust.play();
                this.thrustSoundTimer.set(.08);
            }
        }

        // out of bounds -> crash
        if (abs(this.pos.x) > WORLD_HALF_WIDTH + 12 || this.pos.y < TERRAIN_BASE - 60)
            this.explode();
    }

    updatePhysics()
    {
        if (gameState) return;   // frozen once landed; gone once crashed
        super.updatePhysics();

        // custom collision against the smooth terrain surface
        let hit = false, onPad = true;
        for (const p of this.contactPoints())
        {
            if (p.y <= getTerrainY(p.x))
            {
                hit = true;
                if (abs(p.x - padX) > padWidth/2 - .15)
                    onPad = false;
            }
        }

        if (hit)
        {
            lastTouchdownSpeed = this.velocity.length();
            if (onPad && this.isSafeLanding())
                this.land();
            else
                this.explode();
        }
    }

    render()
    {
        if (this.destroyed) return;
        const w = v => this.pos.add(v.rotate(this.angle));
        const outline = rgb(.08,.10,.16);

        // landing legs + foot pads (behind body)
        const legCol = rgb(.66,.69,.76);
        for (const sx of [-1, 1])
        {
            drawLine(w(vec2(sx*.34,-.74)), w(vec2(sx*.82,-1.46)), .12, legCol);
            drawLine(w(vec2(sx*.62,-1.46)), w(vec2(sx*1.0,-1.46)), .15, legCol); // foot
        }

        // engine nozzle (the flame connects right here)
        drawPoly([vec2(-.22,-.9), vec2(.22,-.9), vec2(.14,-1.12), vec2(-.14,-1.12)],
            rgb(.28,.30,.36), .05, outline, this.pos, this.angle);

        // fins
        const finCol = rgb(.82,.30,.26);
        drawPoly([vec2(-.46,-.18), vec2(-.82,-.84), vec2(-.4,-.66)], finCol, .05, outline, this.pos, this.angle);
        drawPoly([vec2(.46,-.18),  vec2(.82,-.84),  vec2(.4,-.66)],  finCol, .05, outline, this.pos, this.angle);

        // main hull (sleek capsule, pointed nose)
        const body = [
            vec2(0,1.18), vec2(.34,.6), vec2(.46,-.18),
            vec2(.4,-.78), vec2(-.4,-.78), vec2(-.46,-.18), vec2(-.34,.6),
        ];
        drawPoly(body, rgb(.88,.90,.95), .1, outline, this.pos, this.angle);

        // soft cylindrical shading down the right side
        drawPoly([vec2(.06,1.0), vec2(.34,.6), vec2(.46,-.18), vec2(.4,-.78), vec2(.06,-.78)],
            rgb(.32,.36,.46,.45), 0, undefined, this.pos, this.angle);
        // highlight stripe down the left
        drawLine(w(vec2(-.2,.5)), w(vec2(-.3,-.62)), .09, rgb(1,1,1,.5));

        // nose cone accent
        drawPoly([vec2(0,1.18), vec2(.34,.6), vec2(-.34,.6)], finCol, .05, outline, this.pos, this.angle);

        // porthole window (rim + glass + glint)
        const win = w(vec2(0,.28));
        drawCircle(win, .66, rgb(.62,.66,.74));
        drawCircle(win, .5,  rgb(.28,.55,1));
        drawCircle(win.add(vec2(-.1,.1).rotate(this.angle)), .18, rgb(.85,.92,1,.85));

        // bright thruster core at the nozzle while firing (plume itself is particles)
        if (!gameState && this.thrusting)
        {
            const flick = .7 + .3*oscillate(30, 1, time);
            drawCircle(w(vec2(0,-1.1)), .55*flick, rgb(1,.85,.4,.5));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    installAutoPause();

    createTitleMenu({
        title: 'MOON LANDER',
        subtitle: 'Land gently on the glowing pad',
        onPlay: startGame,
        revealOnClick: false,
        showBest: true,
        formatBest: n => 'BEST ' + n,
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitle,
    });

    installDefaultToolbar();
}

///////////////////////////////////////////////////////////////////////////////
function gameInit()
{
    saveDataInit('lunarLander');

    // on-screen touch pad (left stick rotates, face button thrusts)
    touchGamepadEnable = true;
    touchGamepadAnalog = true;
    touchGamepadButtonCount = 1;

    // build a deep, layered starfield once (screen-space, parallax by depth)
    stars = [];
    const layers = [
        { count:180, par:.7,  size:1.2, alpha:.45, twk:1.5, tint:.15 }, // far
        { count:90,  par:1.8, size:1.8, alpha:.7,  twk:2.5, tint:.25 }, // mid
        { count:40,  par:3.4, size:2.6, alpha:.95, twk:4.0, tint:.4  }, // near
    ];
    for (const L of layers)
        for (let i = 0; i < L.count; ++i)
        {
            // a few stars get a faint blue/orange tint for variety
            let col = rgb(1,1,1);
            if (rand() < L.tint)
                col = rand() < .5 ? rgb(.7,.8,1) : rgb(1,.85,.7);
            stars.push({
                x: rand(2000), y: rand(2000), par: L.par,
                size: L.size*rand(1.3,.7), alpha: L.alpha*rand(1,.5),
                twSpeed: rand(L.twk,.3), twPhase: rand(1), col,
            });
        }

    startLevel(1);
    buildMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying() && !gameState})) return;
    if (!isPlaying()) return;

    if (keyWasPressed('KeyR'))
        startGame();

    // continue: next level after landing, new run after crashing
    if (gameState && (keyWasPressed('Space') || keyWasPressed('Enter')))
    {
        if (gameState === 1) startLevel(level + 1);
        else                 startGame();
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    if (gameState)
        return; // freeze camera on win/crash

    if (landingPad && player && !player.destroyed)
    {
        const d = player.pos.subtract(landingPad.pos).length();
        const raw = (CAMERA_ZOOM_OUT_DIST - d) / (CAMERA_ZOOM_OUT_DIST - CAMERA_ZOOM_IN_DIST);
        const z = smoothStep(clamp(raw, 0, 1));

        const mid = player.pos.lerp(landingPad.pos, .5);
        camTarget = mid.lerp(player.pos, z);

        cameraPos = cameraPos.lerp(camTarget, lerp(.06, .18, z));

        const desiredScale = lerp(CAMERA_SCALE_FAR, CAMERA_SCALE_NEAR, z);
        camScale = lerp(camScale, desiredScale, .07);
        cameraScale = camScale;
    }
    else
    {
        cameraPos = cameraPos.lerp(camTarget, .15);
        camScale = lerp(camScale, CAMERA_SCALE_FAR, .07);
        cameraScale = camScale;
    }
}

///////////////////////////////////////////////////////////////////////////////
// Background rendering (screen-space sky/stars/Earth, world-space mountains)

function renderSky()
{
    const W = mainCanvasSize.x, H = mainCanvasSize.y;
    // one big atmosphere gradient: deep space up top, faint glow toward the horizon
    drawRectGradient(vec2(W/2, H/2), vec2(W, H),
        BLACK, hsl(.75,1,.1), 0, true, true);
}

function renderStars()
{
    const W = mainCanvasSize.x, H = mainCanvasSize.y;
    for (const s of stars)
    {
        const sx = mod(s.x - cameraPos.x*s.par, W);
        const sy = mod(s.y + cameraPos.y*s.par, H);
        const a = s.alpha * (.55 + .45*oscillate(s.twSpeed, 1, time, s.twPhase));
        drawRect(vec2(sx,sy), vec2(s.size), rgb(s.col.r, s.col.g, s.col.b, a), 0, true, true);
    }
}

function renderEarth()
{
    const W = mainCanvasSize.x, H = mainCanvasSize.y;
    // very far parallax, sits high in the sky
    const ex = mod(W*.78 - cameraPos.x*6, W*1.6) - W*.3;
    const ey = H*.20 + cameraPos.y*4;
    const p = vec2(ex, ey);
    drawCircleGradient(p, 360, rgb(.35,.6,1,.22), rgb(.35,.6,1,0), true, true); // atmosphere
    drawCircle(p, 150, rgb(.16,.4,.78), 0, BLACK, true, true);                  // ocean
    drawCircle(p.add(vec2(-30,-25)), 55, rgb(.3,.6,.42,.9), 0, BLACK, true, true); // land
    drawCircle(p.add(vec2(40,30)),   42, rgb(.32,.58,.4,.9), 0, BLACK, true, true);
    drawCircle(p.add(vec2(10,-50)),  30, rgb(.9,.95,1,.5), 0, BLACK, true, true);  // cloud/ice
}

// filled silhouette across the visible range, drawn as a WebGL triangle strip
// (top/bottom vertex pairs) so concave terrain fills correctly and stays cheap
function renderTerrainLayer(evalFn, color, samples, rim)
{
    const camSize = getCameraSize();
    const left  = cameraPos.x - camSize.x/2 - 2;
    const right = cameraPos.x + camSize.x/2 + 2;
    const bottom = cameraPos.y - camSize.y/2 - 3;

    const strip = [], tops = [];
    for (let i = 0; i <= samples; ++i)
    {
        const x = lerp(left, right, i/samples);
        const top = vec2(x, evalFn(x));
        tops.push(top);
        strip.push(top, vec2(x, bottom));
    }
    glDrawPoints(strip, color.rgbaInt()); // filled band

    if (rim)
        drawLineList(tops, .16, rim);     // lit surface edge
}

function renderPad()
{
    const c = landingPad.pos;
    // glow + slab
    drawEllipse(c.add(vec2(0,.1)), vec2(padWidth*1.5, 1.4), rgb(.2,1,.4,.12));
    drawRect(c, vec2(padWidth, PAD_THICK), rgb(.18,.9,.38));
    drawRect(c.add(vec2(0,.06)), vec2(padWidth, PAD_THICK*.4), rgb(.55,1,.7,.7));

    // pulsing beacons at each end
    const pulse = .6 + .4*oscillate(2.5, 1, time);
    for (const sx of [-1, 1])
    {
        const b = vec2(padX + sx*padWidth/2, padY + PAD_THICK);
        drawCircleGradient(b.add(vec2(0,.9)), 2.4*pulse, rgb(1,.4,.2,.4*pulse), rgb(1,.4,.2,0));
        drawLine(b, b.add(vec2(0,1.8)), .22, rgb(.6,.2,.1));
        drawCircle(b.add(vec2(0,1.9)), .55, rgb(1, .55, .25, pulse));
    }
}

function gameRender()
{
    renderSky();
    renderStars();
    renderEarth();

    // distant parallax silhouettes (darkest, behind) -> main terrain (lit rim)
    renderTerrainLayer(x => evalOctaves(distFar, x), rgb(.07,.08,.14), 50);
    renderTerrainLayer(x => evalOctaves(distMid, x), rgb(.12,.13,.20), 70);
    renderTerrainLayer(getTerrainY, rgb(.20,.20,.26), 120, rgb(.45,.47,.55));

    renderPad();
}

///////////////////////////////////////////////////////////////////////////////
// One HUD gauge: label + filled bar (+ optional safe-limit tick), screen space
function hudBar(x, y, w, label, frac, color, tickFrac)
{
    const labelW = 44, h = 13;
    const bx = x + labelW, bw = w - labelW;
    drawTextScreen(label, vec2(x, y), 15, rgb(1,1,1,.85), 3, rgb(0,0,0,.7), 'left');
    drawRect(vec2(bx + bw/2, y), vec2(bw+4, h+4), rgb(.06,.07,.11,.95), 0, false, true);
    const f = clamp(frac, 0, 1);
    drawRect(vec2(bx + bw*f/2, y), vec2(bw*f, h), color, 0, false, true);
    if (tickFrac != null)
        drawRect(vec2(bx + bw*clamp(tickFrac,0,1), y), vec2(2, h+8), rgb(1,1,1,.9), 0, false, true);
}

function gameRenderPost()
{
    const alive = player && !player.destroyed;
    const fuel = alive ? player.fuel : 0;
    const maxFuel = player ? player.maxFuel : 80;
    const vel = alive ? player.velocity.length() : 0;
    const ang = alive ? abs(player.angle) : 0;
    const alt = alive ? max(0, player.pos.y - getTerrainY(player.pos.x)) : 0;

    // --- instrument panel, top-LEFT (top-right stays clear for the toolbar) ---
    const px = 16, py = 14, pw = 252, ph = 150;
    drawRect(vec2(px+pw/2, py+ph/2), vec2(pw+4, ph+4), rgb(.4,.55,.9,.18), 0, false, true); // border
    drawRect(vec2(px+pw/2, py+ph/2), vec2(pw, ph), rgb(.04,.05,.09,.6), 0, false, true);    // bg

    drawTextScreen(`LEVEL ${level}`, vec2(px+16, py+26), 26, rgb(1,1,1,.96), 4, rgb(0,0,0,.7), 'left');
    drawTextScreen(`SCORE ${totalScore}`, vec2(px+16, py+54), 18, rgb(.72,.86,1,.96), 3, rgb(0,0,0,.7), 'left');
    drawTextScreen(`ALT ${alt.toFixed(1)}`, vec2(px+pw-16, py+26), 18, rgb(.82,.9,1,.92), 3, rgb(0,0,0,.7), 'right');

    // gauges: speed/tilt turn green inside the safe window, red/orange outside
    const fFuel = fuel/maxFuel;
    const safeC = rgb(.3,.9,.45), badC = rgb(1,.4,.25);
    hudBar(px+16, py+84,  pw-32, 'FUEL', fFuel, fFuel < .25 ? rgb(1,.45,.2) : safeC, null);
    hudBar(px+16, py+110, pw-32, 'SPD',  vel/(SAFE_SPEED*2.2), vel < SAFE_SPEED ? safeC : badC, 1/2.2);
    hudBar(px+16, py+136, pw-32, 'TILT', ang/(SAFE_ANGLE*2.2), ang < SAFE_ANGLE ? safeC : badC, 1/2.2);

    // end states
    if (gameState === 1)
    {
        drawTextScreen(`LEVEL ${level} CLEARED!\n\n+${lastLevelScore}   Total ${totalScore}`,
            vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 54, rgb(.2,1,.4,.97), 8, rgb(0,0,0,.7));
    }
    else if (gameState === 2)
    {
        drawTextScreen(`CRASHED!\n\nReached level ${level}   Score ${totalScore}`,
            vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 54, rgb(1,.3,.22,.97), 8, rgb(0,0,0,.7));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
